<main>
  <h2>Shop</h2>
  <div class="filter">
    <button (click)="filterCategory('All')">All</button>
    <button (click)="filterCategory('Accessories')">Accessories</button>
    <button (click)="filterCategory('School Supplies')">School Supplies</button>
  </div>

  <div class="card-grid">
    @for(p of filteredProducts(); track p._id) {
      <div class="card">
        @if(p.image) {
          <img [src]="getSafeUrl(p.image)" [alt]="p.name" class="product-img">
        }
        @if(p.tag) {
          <span class="tag">{{ p.tag }}</span>
        }
        <h3>{{ p.name }}</h3>
        <p>{{ p.description }}</p>
        <p>Price: ₱{{ p.price }}</p>
        <p>Stock: {{ p.stock }}</p>
        <p>Category: {{ p.category }}</p>
        <button (click)="addToCart(p)">Add to Cart</button>
      </div>
    } @empty {
      <p>No products available yet.</p>
    }
  </div>
</main>
